[DEFAULT]
FileStorePath=logs/store
FileLogPath=logs/sessions
ConnectionType=acceptor
StartTime=00:00:00
EndTime=00:00:00
HeartBtInt=30
UseDataDictionary=Y
DataDictionary=FIX44.xml
ValidateFieldsOutOfOrder=N
ValidateFieldsHaveValues=N
ValidateUserDefinedFields=N

# === LAB 10: RESILIENCE & FAULT TOLERANCE SETTINGS ===
# These settings are CRITICAL for system recovery after network failures
# ResetOnLogon=N prevents sequence number loss on client reconnection
# This allows ResendRequest to retrieve missing messages
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N
UseLocalTime=Y

[SESSION]
BeginString=FIX.4.4
SenderCompID=EXEC_SERVER
TargetCompID=MINIFIX_CLIENT
SocketAcceptPort=9876
